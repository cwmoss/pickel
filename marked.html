<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>marked test</title>
  </head>
  <body>
    <div id="content"></div>
    <script type="module">
      import { marked } from "https://cdn.jsdelivr.net/npm/marked/lib/marked.esm.js";

      const renderer = {
        heading({ tokens, depth }) {
          const text = this.parser.parseInline(tokens);
          const escapedText = text.toLowerCase().replace(/[^\w]+/g, "-");
          console.log("heading", escapedText);
          return `
            <h${depth}>
              <a name="${escapedText}" class="anchor" href="#${escapedText}">
                <span class="header-link"></span>
              </a>
              ${text}
            </h${depth}>`;
        },
      };

      const descriptionList = {
        name: "descriptionList",
        level: "block", // Is this a block-level or inline-level tokenizer?
        start(src) {
          return src.match(/:[^:\n]/)?.index;
        }, // Hint to Marked.js to stop and check for a match
        tokenizer(src, tokens) {
          const rule = /^(?::[^:\n]+:[^:\n]*(?:\n|$))+/; // Regex for the complete token, anchor to string start
          const match = rule.exec(src);
          if (match) {
            const token = {
              // Token to generate
              type: "descriptionList", // Should match "name" above
              raw: match[0], // Text to consume from the source
              text: match[0].trim(), // Additional custom properties
              tokens: [], // Array where child inline tokens will be generated
            };
            this.lexer.inline(token.text, token.tokens); // Queue this data to be processed for inline tokens
            return token;
          }
        },
        renderer(token) {
          return `<dl>${this.parser.parseInline(token.tokens)}\n</dl>`; // parseInline to turn child tokens into HTML
        },
      };

      const description = {
        name: "description",
        level: "inline", // Is this a block-level or inline-level tokenizer?
        start(src) {
          return src.match(/:/)?.index;
        }, // Hint to Marked.js to stop and check for a match
        tokenizer(src, tokens) {
          const rule = /^:([^:\n]+):([^:\n]*)(?:\n|$)/; // Regex for the complete token, anchor to string start
          const match = rule.exec(src);
          if (match) {
            return {
              // Token to generate
              type: "description", // Should match "name" above
              raw: match[0], // Text to consume from the source
              dt: this.lexer.inlineTokens(match[1].trim()), // Additional custom properties, including
              dd: this.lexer.inlineTokens(match[2].trim()), //   any further-nested inline tokens
            };
          }
        },
        renderer(token) {
          return `\n<dt>${this.parser.parseInline(token.dt)}</dt><dd>${this.parser.parseInline(token.dd)}</dd>`;
        },
        childTokens: ["dt", "dd"], // Any child tokens to be visited by walkTokens
      };

      const youtube = {
        name: "youtube",
        level: "inline",
        start(src) {
          return src.match(/!youtube/)?.index;
        },
        tokenizer(src, tokens) {
          console.log("check yt", src);
          const rule = /^!youtube([^\)\n]+\))/; // Regex for the complete token, anchor to string start
          const match = rule.exec(src);
          if (match) {
            return {
              // Token to generate
              type: "youtube", // Should match "name" above
              raw: match[0], // Text to consume from the source
              yid: "//" + match[1].trim() + "//", // Additional custom properties, including
            };
          }
        },
        renderer(token) {
          console.log("render yt", token);
          return `\n<span class="youtube">yt: ${token.yid}</span>`;
        },
        childTokens: [],
      };
      function walkTokens(token) {
        // Post-processing on the completed token tree
        if (token.type === "strong") {
          token.text += " walked";
          token.tokens = this.Lexer.lexInline(token.text);
        }
      }
      marked.use({
        extensions: [descriptionList, description, youtube],
        walkTokens,
      });
      marked.use({ renderer });

      console.log(
        marked.parse(
          "A Description List:\n" +
            ":   Topic 1   :  Description 1\n" +
            ": **Topic 2** : *Description 2*",
        ),
      );

      document.getElementById("content").innerHTML = marked.parse(
        `
# Marked % in the browser

Rendered !youtube[a cat](nsdfasdly) _by_ **marked**.
      `,
      );
    </script>
  </body>
</html>
