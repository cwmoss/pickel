<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>formtest</title>
    <script type="importmap">
      {
        "imports": {
          "lit": "./lit-core.min.js"
        }
      }
    </script>
    <link rel="stylesheet" href="variables.css" />
    <link rel="stylesheet" href="form.css" />
    <script type="module" src="builder/form-builder.js"></script>
    <style>
      body {
        font-family:
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          Roboto,
          Oxygen,
          Ubuntu,
          Cantarell,
          "Open Sans",
          "Helvetica Neue",
          sans-serif;
        --width-card-wide: 350px;
      }

      main {
        display: flex;
        flex-wrap: wrap;
        gap: 1rem;
      }

      my-form {
        display: block;
        width: 400px;
        margin-inline: auto;
      }

      code {
        overflow-wrap: break-word;
      }

      section {
        padding-left: 1rem;
      }

      section > * {
        width: 250px;
      }
    </style>
  </head>

  <body>
    <main>
      <section>
        <h1>Match Result</h1>
        <pi-form-builder id="fb1"></pi-form-builder>
      </section>
      <section>
        <h1>Team</h1>
        <pi-btn id="btn_team2">other team</pi-btn>
        <pi-form-builder id="fb2"></pi-form-builder>
      </section>
    </main>
    <script type="module">
      import PiButton from "./elements/btn.js";
      let schema = `
doc:
  matchresult:
    fields:
      h_goals:
        title: Heim - Gast
        type: number
      g_goals:
        type: number
      h_goals_ne:
        title: Elfmeterschiessen? Heim - Gast
        type: number
      g_goals_ne:
        type: number
      is_closed:
        type: switch
        title: closed?
`;
      fb1.yaml_schema = schema;

      let schema2 = `
doc:
  country:
    fields:
      name:
        title: Name
      position:
        title: Position
        type: number
      ingame:
        type: switch
        title: in game?
  finale:
    fields:
      name:
        title: Name
      `;

      fb2.value = { name: "Kap Verde", ingame: true, position: 3 };
      fb2.yaml_schema = schema2;
      btn_team2.addEventListener(
        "click",
        () => (fb2.value = { name: "Germany", ingame: true, position: 1 }),
      );
    </script>
  </body>
</html>
