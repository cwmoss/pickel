<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>formtest</title>
    <script type="importmap">
      {
        "imports": {
          "lit": "./lit-core.min.js"
        }
      }
    </script>
    <link rel="stylesheet" href="variables.css" />
    <link rel="stylesheet" href="form.css" />
    <script type="module" src="elements/_index.js"></script>
    <script type="module" src="my-form.js"></script>
    <script type="module">
      import "https://ka-f.webawesome.com/webawesome@3.8.0/components/input/input.js";
    </script>
    <style>
      body {
        font-family:
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          Roboto,
          Oxygen,
          Ubuntu,
          Cantarell,
          "Open Sans",
          "Helvetica Neue",
          sans-serif;
        --width-card-wide: 350px;
      }

      main {
        display: flex;
        flex-wrap: wrap;
        gap: 1rem;
      }

      my-form {
        display: block;
        width: 400px;
        margin-inline: auto;
      }

      code {
        overflow-wrap: break-word;
      }

      section > h1 {
        margin-left: 1rem;
      }

      section > * {
        width: 350px;
      }
    </style>
  </head>

  <body>
    <main>
      <section>
        <h1>classic</h1>
        <form id="f1" novalidate>
          <pi-date
            name="bday"
            label="Birthday"
            value="2001-08-23"
            required
          ></pi-date>
          <pi-input
            name="fname0"
            label="First Name"
            required
            m-required="we need your name"
          ></pi-input>
          <pi-number
            name="no_siblings"
            label="Number of Siblings"
            value="3"
            required
          ></pi-number>
          <div class="actions">
            <button>Send</button>
          </div>
          <div><code></code></div>
        </form>
      </section>
      <section>
        <h1>custom form</h1>
        <my-form></my-form>
      </section>

      <section>
        <h1>plain form</h1>
        <form id="fplain">
          <label for="fname">Name</label>
          <input id="fname" name="fname" required />
          <label for="bday">bday</label>
          <input
            id="bday"
            type="date"
            name="bday"
            value="1987-04-23"
            required
          />
          <div class="actions">
            <button>Send</button>
          </div>
        </form>
      </section>
      <section>
        <h1>debug form</h1>
        <form id="fdebug">
          <test-input id="fname3" name="fname3"></test-input>

          <div class="actions">
            <button>Send</button>
          </div>
        </form>
      </section>
    </main>
    <script type="module">
      f1.addEventListener("submit", (e) => {
        e.preventDefault();
        const data = Object.fromEntries(new FormData(e.target).entries());
        console.log("classic", data);
        e.target.querySelector("code").innerText = JSON.stringify(data);
      });
    </script>
  </body>
</html>
