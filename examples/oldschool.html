<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      * {
        box-sizing: border-box;
      }

      body {
        font-family: Verdana, Arial, Helvetica, sans-serif;
        font-size: 10pt;
        background: #ffe6f2;
        background-image: radial-gradient(#ffd1e6 1px, transparent 1px);
        background-size: 12px 12px;
        margin: 0;
        color: #333;
      }

      hr {
        border: none;
        height: 8px;
        background: repeating-linear-gradient(
          45deg,
          #ffd6ec,
          #ffd6ec 5px,
          #ffffff 5px,
          #ffffff 10px
        );
        margin: 15px 0;
      }
      h1 {
        padding: 1rem;
      }
      main {
        max-width: 900px;
        margin: 20px auto;
        background: linear-gradient(#ffffff, #fff0f6);
        border: 3px double #ff9ec4;
        padding: 12px;
        box-shadow: 0 0 10px #ffc1da;
      }
    </style>
  </head>
  <body>
    <h1>very old school</h1>
    <hr />
    <main>
      <h2>etwas inhalt</h2>
      <p>bitte</p>
      <p>danke</p>
    </main>
  </body>
</html>
